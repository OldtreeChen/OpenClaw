name: Keep Render Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://restaurant-agent-ot4f.onrender.com/health
